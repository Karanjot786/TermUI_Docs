<svg width="512" height="512" viewBox="0 0 512 512" fill="none" xmlns="http://www.w3.org/2000/svg">
  <rect width="512" height="512" rx="96" fill="#0a0a0f"/>
  <rect x="2" y="2" width="508" height="508" rx="94" stroke="#00ff88" stroke-opacity="0.1" stroke-width="2"/>

  <radialGradient id="bg" cx="50%" cy="50%" r="50%">
    <stop offset="0%" stop-color="#00ff88" stop-opacity="0.08"/>
    <stop offset="100%" stop-color="#00ff88" stop-opacity="0"/>
  </radialGradient>
  <rect width="512" height="512" rx="96" fill="url(#bg)"/>

  <defs>
    <filter id="glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="12" result="blur"/>
      <feMerge>
        <feMergeNode in="blur"/>
        <feMergeNode in="SourceGraphic"/>
      </feMerge>
    </filter>
  </defs>

  <!-- > chevron -->
  <path d="M 90 110 L 278 256 L 90 402"
    stroke="#00ff88" stroke-width="50"
    stroke-linecap="round" stroke-linejoin="round"
    filter="url(#glow)"/>

  <!-- _ cursor bar -->
  <rect x="304" y="368" width="148" height="42" rx="21"
    fill="#00ff88" filter="url(#glow)"/>
</svg>
